<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SinPicos - Control Glucémico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Estilos específicos para la pantalla de Auth (Estilo PlatoFit/SinPicos) */
        #auth-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .auth-card {
            background: #f8f9fa;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .auth-card h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
        }

        .btn-google {
            background-color: #ffffff;
            color: #757575;
            border: 1px solid #ddd;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-google:hover {
            background-color: #f1f1f1;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-card">
            <i class="fas fa-chart-line" style="font-size: 3rem; color: #4CAF50; margin-bottom: 1rem;"></i>
            <h2>Bienvenido a SinPicos</h2>
            <p style="color: #666; margin-bottom: 2rem;">Inicia sesión para gestionar tus niveles de glucosa.</p>
            
            <button class="btn-google" id="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18">
                Continuar con Google
            </button>
            
            <p id="auth-error" style="color: #e74c3c; margin-top: 1rem; font-size: 0.9rem; display: none;"></p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header>
            <div class="header-container">
                <h1>SinPicos</h1>
                <button id="btn-logout" style="background: none; border: none; color: white; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </header>

        <main>
            <section class="dashboard">
                <p>Cargando datos de usuario...</p>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 1. PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE PARA SINPICOS
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_DOMINIO.firebaseapp.com",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_BUCKET.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Referencias DOM
        const authContainer = document.getElementById('auth-container');
        const appContent = document.getElementById('app-content');
        const btnGoogle = document.getElementById('btn-google');
        const btnLogout = document.getElementById('btn-logout');
        const errorMsg = document.getElementById('auth-error');

        // 2. LÓGICA DE AUTENTICACIÓN
        btnGoogle.addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                errorMsg.innerText = "Error al conectar con Google. Inténtalo de nuevo.";
                errorMsg.style.display = 'block';
                console.error(error);
            }
        });

        btnLogout.addEventListener('click', () => {
            signOut(auth);
        });

        // 3. OBSERVADOR DE ESTADO (El corazón de la integración)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuario logueado: Mostramos la web y ocultamos el login
                authContainer.classList.add('hidden');
                appContent.classList.remove('hidden');
                console.log("Bienvenido:", user.displayName);
                
                // Aquí podrías llamar a tu función de cargar datos de glucosa
                // inicializarGraficas(user.uid); 
            } else {
                // Usuario no logueado: Mostramos login y ocultamos la web
                authContainer.classList.remove('hidden');
                appContent.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
